<!DOCTYPE html>
<html lang="pl">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/normalize/8.0.1/normalize.min.css"
        integrity="sha512-NhSC1YmyruXifcj/KFRWoC561YpHpc5Jtzgvbuzx5VozKpWvQ+4nXhPdFgmx8xqexRcpAglTj9sIBWINXa8x5w=="
        crossorigin="anonymous" referrerpolicy="no-referrer" />
    <link rel="stylesheet" href="css/currency-conventer.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Lato:ital,wght@0,400;0,700;1,400&display=swap"
        rel="stylesheet">
    <script defer src="js/currency-conventer.js"></script>
    <title>Przelicznik walut</title>
</head>

<body class="body body--backgroundImage">

    <form class="form js-form">
        <fieldset class="form__fieldset">
            <legend class="form__legend">Przelicznik walut</legend>
            <p class="form__paragraph form__paragraph--light">Obowiązkowe pola zaznaczono*.</p>
            <p><label class="form__label">Kwota w PLN*<br><input class="form__input js-pln__input" name="currencyPln"
                        required type="number" min="0.1" max="999999" step="0.1" placeholder="Wpisz kwotę w PLN"
                        value="10"></label></p>
            <p><label class="form__label">Wybierz walutę* <br><input checked
                        class="form__input--radio js-radioEuro__input" type="radio" name="currencyRadio"
                        value="euro"><span class="form__span--radio">Euro</span></label>
                <label><input class="form__input--radio js-radioUsd__input" type="radio" name="currencyRadio"
                        value="usd"><span class="form__span--radio">USD</span></label>
                <label><input class="form__input--radio js-radioCad__input" type="radio" name="currencyRadio"
                        value="cad">CAD</label>
                <label><input class="form__input--radio js-radioGbp__input" type="radio" name="currencyRadio"
                        value="gbp">GBP</label>
            </p>
        </fieldset>
        <button class=" form__button">Przelicz</button>
        <p class="form__paragraph form__paragraph--larger">Wynik:</p>
        <p class="form__paragraph">
            <strong class="form__strong js-form__strong"></strong>
        </p>
    </form>
</body>

</html>
